<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fake News Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #f8fafc;
    }
    header h1 span { color: #6366f1; }
    header p {
      color: #94a3b8;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 720px;
      margin-bottom: 24px;
    }

    textarea {
      width: 100%;
      height: 160px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 14px;
      resize: vertical;
      outline: none;
      transition: border 0.2s;
    }
    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #475569; }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }

    #analyzeBtn {
      background: #6366f1;
      color: #fff;
      flex: 1;
    }
    #clearBtn {
      background: #334155;
      color: #94a3b8;
    }

    /* Result */
    #result { display: none; }

    .verdict {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .verdict-badge {
      font-size: 1.5rem;
      font-weight: 800;
      padding: 10px 24px;
      border-radius: 50px;
    }
    .badge-real { background: #14532d; color: #4ade80; }
    .badge-fake { background: #450a0a; color: #f87171; }

    .confidence-bar-wrap {
      flex: 1;
    }
    .confidence-label {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    .confidence-bar {
      height: 10px;
      background: #334155;
      border-radius: 99px;
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.8s ease;
    }
    .fill-real { background: #4ade80; }
    .fill-fake { background: #f87171; }

    .reasons-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 10px;
    }
    .reason-tag {
      display: inline-block;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.82rem;
      color: #94a3b8;
      margin: 4px 4px 4px 0;
    }

    /* History */
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .history-header h3 { font-size: 1rem; color: #94a3b8; }
    #clearHistoryBtn {
      background: transparent;
      border: 1px solid #334155;
      color: #64748b;
      font-size: 0.78rem;
      padding: 6px 14px;
      border-radius: 8px;
    }

    .history-list { display: flex; flex-direction: column; gap: 10px; }

    .history-item {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .history-text {
      font-size: 0.85rem;
      color: #cbd5e1;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .mini-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
    }
    .mini-real { background: #14532d; color: #4ade80; }
    .mini-fake { background: #450a0a; color: #f87171; }
    .history-conf { font-size: 0.78rem; color: #64748b; }

    .loading { text-align: center; padding: 20px; color: #6366f1; font-size: 0.95rem; }

    #error-msg {
      color: #f87171;
      font-size: 0.88rem;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Fake News <span>Detector</span></h1>
    <p>Paste a headline or article — our ML model will analyze it instantly.</p>
  </header>

  <!-- Input Card -->
  <div class="card">
    <textarea id="newsInput" placeholder="Paste a news headline or article here..."></textarea>
    <div class="btn-row">
      <button id="analyzeBtn" onclick="analyze()">🔍 Analyze</button>
      <button id="clearBtn" onclick="clearInput()">Clear</button>
    </div>
    <div id="error-msg"></div>
  </div>

  <!-- Result Card -->
  <div class="card" id="result">
    <div class="verdict">
      <div class="verdict-badge" id="verdictBadge">—</div>
      <div class="confidence-bar-wrap">
        <div class="confidence-label" id="confLabel">Confidence: —</div>
        <div class="confidence-bar">
          <div class="confidence-fill" id="confFill" style="width:0%"></div>
        </div>
      </div>
    </div>
    <div class="reasons-title">Analysis Details</div>
    <div id="reasonTags"></div>
  </div>

  <!-- History Card -->
  <div class="card" id="historyCard">
    <div class="history-header">
      <h3>Recent Analyses</h3>
      <button id="clearHistoryBtn" onclick="clearHistory()">Clear History</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="loading">Loading history...</div>
    </div>
  </div>

  <script>
    const API = "http://127.0.0.1:8000";

    async function analyze() {
      const text = document.getElementById("newsInput").value.trim();
      const errEl = document.getElementById("error-msg");
      errEl.style.display = "none";

      if (!text) {
        errEl.textContent = "Please enter some text first.";
        errEl.style.display = "block";
        return;
      }

      const btn = document.getElementById("analyzeBtn");
      btn.textContent = "Analyzing...";
      btn.disabled = true;

      try {
        const res  = await fetch(`${API}/predict`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });
        const data = await res.json();

        if (data.error) {
          errEl.textContent = data.error;
          errEl.style.display = "block";
          return;
        }

        showResult(data);
        loadHistory();
      } catch (e) {
        errEl.textContent = "Could not connect to backend. Is the server running?";
        errEl.style.display = "block";
      } finally {
        btn.textContent = "🔍 Analyze";
        btn.disabled = false;
      }
    }

    function showResult(data) {
      const resultEl = document.getElementById("result");
      resultEl.style.display = "block";

      const badge = document.getElementById("verdictBadge");
      badge.textContent = data.label === "Real" ? "✅ Real News" : "🚨 Fake News";
      badge.className = "verdict-badge " + (data.label === "Real" ? "badge-real" : "badge-fake");

      document.getElementById("confLabel").textContent = `Confidence: ${data.confidence}%`;

      const fill = document.getElementById("confFill");
      fill.className = "confidence-fill " + (data.label === "Real" ? "fill-real" : "fill-fake");
      setTimeout(() => { fill.style.width = data.confidence + "%"; }, 50);

      const tagsEl = document.getElementById("reasonTags");
      tagsEl.innerHTML = data.reasons
        .map(r => `<span class="reason-tag">${r}</span>`)
        .join("");

      resultEl.scrollIntoView({ behavior: "smooth" });
    }

    async function loadHistory() {
      try {
        const res  = await fetch(`${API}/history`);
        const data = await res.json();
        const list = document.getElementById("historyList");

        if (!data.length) {
          list.innerHTML = `<div style="color:#475569;font-size:0.85rem;text-align:center;padding:16px;">No history yet.</div>`;
          return;
        }

        list.innerHTML = data.map(h => `
          <div class="history-item">
            <div class="history-text" title="${h.text}">${h.text}</div>
            <div class="history-meta">
              <span class="mini-badge ${h.label === 'Real' ? 'mini-real' : 'mini-fake'}">${h.label}</span>
              <span class="history-conf">${h.confidence}%</span>
            </div>
          </div>
        `).join("");
      } catch {
        document.getElementById("historyList").innerHTML =
          `<div style="color:#475569;font-size:0.85rem;text-align:center;padding:16px;">Backend not connected.</div>`;
      }
    }

    async function clearHistory() {
      await fetch(`${API}/history`, { method: "DELETE" });
      loadHistory();
    }

    function clearInput() {
      document.getElementById("newsInput").value = "";
      document.getElementById("result").style.display = "none";
      document.getElementById("error-msg").style.display = "none";
    }

    // Load history on page open
    loadHistory();
  </script>

</body>
</html>
